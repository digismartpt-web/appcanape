  <script>
    // Rapporteur d'erreur professionnel
    window.onerror = function(msg, url, lineNo, columnNo, error) {
      const errorBox = document.createElement('div');
      errorBox.style.cssText = 'position:fixed;top:0;left:0;width:100%;background:red;color:white;padding:20px;z-index:9999;font-family:sans-serif;font-size:14px;';
      errorBox.innerHTML = '<strong>❌ Erreur de Production détectée :</strong><br>' + msg + '<br>Fichier: ' + url + ' (Ligne: ' + lineNo + ')';
      document.body.appendChild(errorBox);
      return false;
    };
  </script>
